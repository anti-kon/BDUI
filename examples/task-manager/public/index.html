<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Taskly</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        margin: 0;
        background: var(--bdui-bg, #f8fafc);
        color: var(--bdui-fg, #0f172a);
      }
      header {
        padding: 16px 24px;
        background: #4f46e5;
        color: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      #app {
        max-width: 720px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .bdui-row,
      .bdui-column {
        display: flex;
      }
      .bdui-row {
        flex-direction: row;
      }
      .bdui-column {
        flex-direction: column;
      }
      input,
      select,
      button {
        font: inherit;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Taskly — a BDUI showcase</h1>
    </header>
    <main id="app">Loading…</main>
    <script type="module" src="/client.js"></script>
  </body>
</html>
