<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Операционный пульт - BDUI</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #fbfcfe;
        --ink: #182230;
        --muted: #6b7688;
        --primary: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: var(--page-bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      input,
      select,
      button {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .bdui-row,
      .bdui-column {
        display: flex;
      }

      .bdui-row {
        flex-direction: row;
      }

      .bdui-column {
        flex-direction: column;
      }

      .bdui-button {
        border-radius: 4px;
        border: 1px solid #aebccd;
        padding: 9px 13px;
        font-weight: 800;
        box-shadow: none;
      }

      .bdui-button--primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }

      .bdui-button--secondary {
        background: #ffffff;
        color: #24324a;
      }

      #app {
        min-height: 100vh;
      }

      #app > div > h2 {
        display: none;
      }

      #app:empty::before,
      #app.loading::before {
        content: 'Загружаем операционный пульт...';
        display: block;
        max-width: 360px;
        margin: 20vh auto 0;
        padding: 18px;
        border: 1px solid #d8e0ea;
        border-radius: 4px;
        background: #ffffff;
        color: var(--muted);
        text-align: center;
      }

      #cache-status {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="app" class="loading"></main>
    <div id="cache-status">Загружаем контракт...</div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
