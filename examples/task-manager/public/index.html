<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Taskly Operations - BDUI Showcase</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f3f6fb;
        --ink: #152033;
        --muted: #6b7688;
        --primary: #2f6fed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: var(--page-bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      input,
      select,
      button {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .bdui-row,
      .bdui-column {
        display: flex;
      }

      .bdui-row {
        flex-direction: row;
      }

      .bdui-column {
        flex-direction: column;
      }

      .bdui-button {
        border-radius: 8px;
        border: 1px solid #c8d5e5;
        padding: 9px 13px;
        font-weight: 700;
      }

      .bdui-button-primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }

      .bdui-button-secondary {
        background: #ffffff;
        color: #24324a;
      }

      #app {
        min-height: 100vh;
      }

      #app > div > h2 {
        display: none;
      }

      #app:empty::before,
      #app.loading::before {
        content: 'Loading Taskly Operations...';
        display: block;
        max-width: 360px;
        margin: 20vh auto 0;
        padding: 18px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #ffffff;
        color: var(--muted);
        text-align: center;
        box-shadow: 0 12px 30px rgba(19, 32, 51, 0.08);
      }

      #cache-status {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 20;
        max-width: min(360px, calc(100vw - 28px));
        padding: 8px 10px;
        border: 1px solid #d8e0ea;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--muted);
        font-size: 12px;
        box-shadow: 0 8px 22px rgba(19, 32, 51, 0.08);
      }
    </style>
  </head>
  <body>
    <main id="app" class="loading"></main>
    <div id="cache-status">Loading contract...</div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
